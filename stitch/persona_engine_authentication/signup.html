<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mythos AI Signup</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8b5cf6", "primary-hover": "#7c3aed",
                        "background-dark": "#000000", "surface-dark": "#121212", "surface-border": "#27272a", "text-secondary": "#a1a1aa",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'neon': '0 0 20px -5px rgba(139, 92, 246, 0.5)',
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Spline Sans', sans-serif;
            min-height: max(884px, 100dvh);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body
    class="bg-background-dark min-h-screen flex flex-col items-center justify-center font-display antialiased selection:bg-primary/30 selection:text-primary text-slate-100 p-4">
    <div class="w-full max-w-[420px] flex flex-col relative z-10">
        <div class="flex flex-col items-center justify-center mb-8 pt-6">
            <div
                class="w-16 h-16 rounded-2xl bg-surface-dark border border-surface-border flex items-center justify-center mb-6 shadow-neon relative overflow-hidden group">
                <div class="absolute inset-0 bg-primary/20 blur-xl"></div>
                <span class="material-symbols-outlined text-primary text-[32px] relative z-10">person_add</span>
            </div>
            <h1 class="text-white tracking-tight text-[32px] font-bold leading-tight text-center">Join Mythos AI</h1>
            <p class="text-text-secondary text-base font-normal mt-2 text-center max-w-[280px]">
                Create an account to save your characters and chats.
            </p>
        </div>
        <div class="flex flex-col gap-5 w-full">
            <div class="flex flex-col w-full">
                <label class="sr-only">Username / Email</label>
                <div class="relative flex w-full items-center">
                    <input
                        class="form-input flex w-full rounded-xl border border-surface-border bg-surface-dark text-white focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-zinc-600 pl-4 pr-12 text-base transition-colors duration-200"
                        placeholder="Username" type="text" id="signup-username" />
                    <div
                        class="absolute right-0 flex items-center justify-center pr-4 pointer-events-none text-zinc-500">
                        <span class="material-symbols-outlined text-[20px]">person</span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col w-full">
                <label class="sr-only">Password</label>
                <div class="relative flex w-full items-center">
                    <input
                        class="form-input flex w-full rounded-xl border border-surface-border bg-surface-dark text-white focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-zinc-600 pl-4 pr-12 text-base transition-colors duration-200"
                        placeholder="Password min 8 chars" type="password" id="signup-password" />
                    <div
                        class="absolute right-0 flex items-center justify-center pr-4 cursor-pointer text-zinc-500 hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col gap-4 mt-2">
                <button id="signup-btn"
                    class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 px-6 bg-primary hover:bg-primary-hover active:scale-[0.98] transition-all text-white text-base font-bold tracking-wide shadow-neon border border-primary/50">
                    <span>Sign Up</span>
                </button>
            </div>
        </div>
        <div class="mt-8 text-center">
            <p class="text-text-secondary text-sm font-normal">
                Already have an account?
                <a class="text-primary font-semibold hover:text-primary-hover hover:underline decoration-2 underline-offset-4 ml-1 transition-colors"
                    href="code.html">Login</a>
            </p>
        </div>
    </div>
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-primary/5 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-900/10 rounded-full blur-[100px]">
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";

        document.addEventListener("DOMContentLoaded", () => {
            const usernameInput = document.getElementById('signup-username');
            const passwordInput = document.getElementById('signup-password');
            const signupBtn = document.getElementById('signup-btn');

            if (signupBtn) {
                signupBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const username = usernameInput.value.trim();
                    const password = passwordInput.value;

                    if (!username || !password || password.length < 8) {
                        alert("Please enter a username and a password with at least 8 characters.");
                        return;
                    }

                    signupBtn.innerHTML = `<span>Loading...</span>`;

                    try {
                        const response = await fetch(`${API_BASE_URL}/signup`, {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({ username, password })
                        });

                        if (response.ok) {
                            alert("Signup successful! Redirecting to login...");
                            window.location.href = "code.html";
                        } else {
                            const err = await response.json();
                            alert(err.detail || "Signup failed");
                            signupBtn.innerHTML = `<span>Sign Up</span>`;
                        }
                    } catch (error) {
                        console.error("Signup Error:", error);
                        alert("An error occurred during signup.");
                        signupBtn.innerHTML = `<span>Sign Up</span>`;
                    }
                });
            }
        });
    </script>
</body>

</html>
