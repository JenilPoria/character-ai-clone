<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mythos AI - Character Discovery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6366f1", "secondary": "#a855f7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#050505", "card-dark": "#0a0a0a", "input-dark": "#121212",
                        "text-muted": "#94a3b8",
                        "accent-blue": "#3b82f6",
                        "accent-purple": "#8b5cf6",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    boxShadow: {
                        'neon': '0 0 10px rgba(99, 102, 241, 0.3), 0 0 20px rgba(139, 92, 246, 0.1)',
                        'neon-hover': '0 0 15px rgba(99, 102, 241, 0.5), 0 0 30px rgba(139, 92, 246, 0.2)',
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .mask-gradient-r {
            mask-image: linear-gradient(to right, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
        }

        .neon-border {
            position: relative;
        }

        .neon-border::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(45deg, rgba(59, 130, 246, 0.5), rgba(139, 92, 246, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card-glow:hover {
            box-shadow: 0 0 20px -5px rgba(139, 92, 246, 0.3);
            border-color: rgba(139, 92, 246, 0.5);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <header
        class="sticky top-0 z-30 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-slate-200 dark:border-white/10">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <div
                    class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 text-white shadow-lg shadow-indigo-500/20">
                    <span class="material-symbols-outlined text-2xl">smart_toy</span>
                </div>
                <h1
                    class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-indigo-200 to-white">
                    Mythos AI</h1>
            </div>
            <div class="flex items-center gap-3">
                <button
                    class="hidden md:flex items-center gap-1 text-sm font-semibold text-indigo-400 hover:text-indigo-300 transition-colors shadow-neon rounded-full px-3 py-1 bg-white/5 border border-white/10 header-create-btn">
                    <span class="material-symbols-outlined text-xl">add_circle</span>
                    <span>Create</span>
                </button>
                <div id="auth-section" class="flex items-center gap-2">
                    <!-- Dynamic Auth View injected here -->
                </div>
            </div>
        </div>
        <div class="px-4 pb-4">
            <div class="relative group">
                <div
                    class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-text-muted group-focus-within:text-indigo-400 transition-colors">
                    <span class="material-symbols-outlined">search</span>
                </div>
                <input
                    class="block w-full rounded-xl border border-transparent bg-slate-100 dark:bg-input-dark py-3 pl-10 pr-4 text-sm text-slate-900 dark:text-white placeholder-slate-500 dark:placeholder-text-muted focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500/50 transition-all shadow-sm focus:shadow-neon dark:focus:bg-[#1a1a1a]"
                    placeholder="Search characters, roles, or tags..." type="text" />
            </div>
        </div>
        <div class="flex gap-2 px-4 pb-3 overflow-x-auto no-scrollbar mask-gradient-r">
            <button
                class="flex h-8 shrink-0 items-center justify-center rounded-full bg-gradient-to-r from-indigo-600 to-purple-600 px-4 text-xs font-semibold text-white shadow-lg shadow-indigo-500/20 transition-transform active:scale-95 border border-white/10">
                All
            </button>
            <button
                class="flex h-8 shrink-0 items-center justify-center rounded-full bg-slate-200 dark:bg-input-dark px-4 text-xs font-medium text-slate-700 dark:text-text-muted hover:bg-slate-300 dark:hover:bg-[#222] hover:text-white transition-colors active:scale-95 border border-transparent hover:border-white/10">
                Popular
            </button>
            <button
                class="flex h-8 shrink-0 items-center justify-center rounded-full bg-slate-200 dark:bg-input-dark px-4 text-xs font-medium text-slate-700 dark:text-text-muted hover:bg-slate-300 dark:hover:bg-[#222] hover:text-white transition-colors active:scale-95 border border-transparent hover:border-white/10">
                Fantasy
            </button>
            <button
                class="flex h-8 shrink-0 items-center justify-center rounded-full bg-slate-200 dark:bg-input-dark px-4 text-xs font-medium text-slate-700 dark:text-text-muted hover:bg-slate-300 dark:hover:bg-[#222] hover:text-white transition-colors active:scale-95 border border-transparent hover:border-white/10">
                Sci-Fi
            </button>
            <button
                class="flex h-8 shrink-0 items-center justify-center rounded-full bg-slate-200 dark:bg-input-dark px-4 text-xs font-medium text-slate-700 dark:text-text-muted hover:bg-slate-300 dark:hover:bg-[#222] hover:text-white transition-colors active:scale-95 border border-transparent hover:border-white/10">
                Anime
            </button>
            <button
                class="flex h-8 shrink-0 items-center justify-center rounded-full bg-slate-200 dark:bg-input-dark px-4 text-xs font-medium text-slate-700 dark:text-text-muted hover:bg-slate-300 dark:hover:bg-[#222] hover:text-white transition-colors active:scale-95 border border-transparent hover:border-white/10">
                Assistants
            </button>
        </div>
    </header>
    <main class="flex-1 overflow-y-auto px-4 py-6 bg-background-light dark:bg-background-dark">
        <section class="mb-8">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-slate-900 dark:text-white flex items-center gap-2">
                    <span class="material-symbols-outlined text-indigo-400">trending_up</span>
                    Trending Now
                </h2>
                <a class="text-xs font-medium text-indigo-400 hover:text-indigo-300 hover:underline" href="#">See
                    all</a>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3" id="character-grid">
                <!-- Dynamic characters will be loaded here -->
            </div>
        </section>
        <div class="h-24"></div>
    </main>
    <nav
        class="fixed bottom-0 left-0 w-full z-40 bg-background-dark/80 backdrop-blur-xl border-t border-white/10 pb-safe pt-2">
        <div class="flex items-center justify-around px-2 pb-3">
            <a class="group flex flex-1 flex-col items-center justify-center gap-1 rounded-xl p-1 text-indigo-400 transition-colors"
                href="#">
                <span
                    class="material-symbols-outlined text-[28px] font-variation-settings-fill drop-shadow-[0_0_8px_rgba(99,102,241,0.5)]">explore</span>
                <span class="text-[10px] font-medium leading-none">Discover</span>
            </a>
            <a class="group flex flex-1 flex-col items-center justify-center gap-1 rounded-xl p-1 text-text-muted hover:text-white transition-colors"
                href="#">
                <span
                    class="material-symbols-outlined text-[28px] group-hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">chat_bubble</span>
                <span class="text-[10px] font-medium leading-none">Chats</span>
            </a>
            <div class="relative -top-6">
                <a class="flex h-14 w-14 flex-col items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 text-white shadow-lg shadow-indigo-500/40 ring-4 ring-[#050505] transition-all hover:scale-105 active:scale-95 group"
                    href="#">
                    <span
                        class="material-symbols-outlined text-[32px] group-hover:rotate-90 transition-transform duration-300">add</span>
                </a>
                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-8 h-2 bg-indigo-500/30 blur-md rounded-full">
                </div>
            </div>
            <a class="group flex flex-1 flex-col items-center justify-center gap-1 rounded-xl p-1 text-text-muted hover:text-white transition-colors"
                href="#">
                <span
                    class="material-symbols-outlined text-[28px] group-hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">groups</span>
                <span class="text-[10px] font-medium leading-none">Community</span>
            </a>
            <a class="group flex flex-1 flex-col items-center justify-center gap-1 rounded-xl p-1 text-text-muted hover:text-white transition-colors"
                href="../user_profile/code.html">
                <span
                    class="material-symbols-outlined text-[28px] group-hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">person</span>
                <span class="text-[10px] font-medium leading-none">Profile</span>
            </a>
        </div>
    </nav>
    <style>
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .font-variation-settings-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";

        document.addEventListener("DOMContentLoaded", async () => {
            // Check if the user is authenticated either via token or guest
            const token = localStorage.getItem("access_token");
            const guestId = localStorage.getItem("X-Guest-ID");

            const authSection = document.getElementById("auth-section");
            if (token) {
                // Fetch User Profile to get Name
                try {
                    const profRes = await fetch(`${API_BASE_URL}/user/characters`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    if (profRes.ok) {
                        const profData = await profRes.json();
                        authSection.innerHTML = `
                            <div class="flex items-center gap-2 px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full cursor-pointer hover:bg-indigo-500/20 transition-colors" onclick="window.location.href='../user_profile/code.html'">
                                <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white text-xs font-bold">
                                    ${profData.username.charAt(0).toUpperCase()}
                                </div>
                                <span class="text-sm font-semibold text-indigo-300">${profData.username}</span>
                            </div>
                        `;
                    } else {
                        renderGuestAuth(authSection);
                    }
                } catch (e) {
                    renderGuestAuth(authSection);
                }
            } else {
                renderGuestAuth(authSection);
            }

            // Fetch characters
            try {
                const response = await fetch(`${API_BASE_URL}/chat/all_characters`);
                if (response.ok) {
                    const characters = await response.json();
                    renderCharacters(characters);
                } else {
                    console.error("Failed to fetch characters");
                }
            } catch (e) {
                console.error("Error fetching characters:", e);
            }

            // Handle "Create" button redirects
            const createBtns = document.querySelectorAll('.text-indigo-400'); // Note: You might want to use a more specific class or id
            document.querySelectorAll('.header-create-btn, a[href="#"]:has(span:contains("add"))').forEach(btn => {
                // Actually wait, let's just listen to the main floating button and the new header button
            });

            const headerCreateBtn = document.querySelector('.header-create-btn');
            const floatingCreateBtn = document.querySelector('nav a[href="#"].group');

            const handleCreateClick = (e) => {
                e.preventDefault();
                if (!token) {
                    alert("You need to be logged in to create a character.");
                    return;
                }
                window.location.href = "../create_new_ai_character_form/code.html";
            }
            if (headerCreateBtn) headerCreateBtn.addEventListener('click', handleCreateClick);

            // Re-targeting the floating create button correctly
            const floats = document.querySelectorAll('nav a.group');
            floats.forEach(f => {
                if (f.innerHTML.includes('add')) f.addEventListener('click', handleCreateClick);
            });

        });

        function renderGuestAuth(container) {
            container.innerHTML = `
                <a href="../persona_engine_authentication/code.html" class="text-xs font-semibold text-slate-300 hover:text-white transition-colors px-2">Sign In</a>
                <a href="../persona_engine_authentication/signup.html" class="text-xs font-semibold bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1 rounded-full transition-colors shadow-lg shadow-indigo-500/20">Sign Up</a>
            `;
        }

        function renderCharacters(characters) {
            const grid = document.getElementById('character-grid');
            if (!grid) return;

            grid.innerHTML = ""; // Clear existing dummy cards

            characters.forEach(char => {
                const charId = char.id;
                const name = char.name;
                const role = char.prompt_data?.CHAR_ROLE || "Assistant";

                // Random static image for demo if no avatar
                const imgUrl = `https://picsum.photos/seed/${charId}/300/400`;

                const cardHTML = `
        <div class="relative aspect-[3/4] rounded-xl overflow-hidden shadow-lg group cursor-pointer neon-border bg-card-dark" onclick="window.location.href='../active_ai_chat_interface/code.html?char_id=${charId}'">
            <img alt="${name}" class="absolute inset-0 h-full w-full object-cover transition-transform duration-700 group-hover:scale-105" src="${imgUrl}"/>
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-90"></div>
            <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 bg-gradient-to-t from-indigo-900/60 via-transparent to-transparent"></div>
            <div class="absolute bottom-0 left-0 w-full p-3 z-10">
            <div class="flex justify-between items-end">
            <div>
            <h3 class="text-sm font-bold text-white mb-0.5 drop-shadow-md truncate max-w-[120px]">${name}</h3>
            <p class="text-[10px] text-slate-300 line-clamp-1">${role}</p>
            </div>
            <div class="flex items-center gap-1 text-[10px] text-slate-400 bg-black/40 px-1.5 py-0.5 rounded-full backdrop-blur-sm">
            <span class="material-symbols-outlined text-[12px] text-indigo-400">chat_bubble</span>
            </div>
            </div>
            </div>
        </div>
        `;
                grid.innerHTML += cardHTML;
            });
        }
    </script>
</body>

</html>
